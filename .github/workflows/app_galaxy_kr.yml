name: 02 Blogger Autopost googleplay kr

on:
  workflow_dispatch:

  schedule:
    # 한국시간 10:00 (앱스토어 09:00 에서 1 시간 차)
    - cron: "0 1 * * *"

    # 한국시간 16:00 (앱스토어 15:00 에서 1 시간 차)
    - cron: "0 7 * * *"

    # 한국시간 22:00 (앱스토어 21:00 에서 1 시간 차)
    - cron: "0 13 * * *"

jobs:
  autopost:
    runs-on: windows-latest

    env:
      API_KEYS_JSON: ${{ secrets.API_KEYS_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # blogger_token.json (원문 JSON)
      - name: Create blogger_token.json
        shell: powershell
        run: |
          @'
          ${{ secrets.BLOGGER_TOKEN_JSON }}
          '@ | Set-Content blogger_token.json

      # cc.json (Base64)
      - name: Restore cc.json
        run: |
          echo "${{ secrets.CC_JSON_B64 }}" > cc.json.b64
          certutil -decode cc.json.b64 cc.json

      # sheetapi.json (Base64)
      - name: Restore sheetapi.json
        run: |
          echo "${{ secrets.SHEETAPI_JSON_B64 }}" > sheetapi.json.b64
          certutil -decode sheetapi.json.b64 sheetapi.json

      # openai.json (Base64)
      - name: Restore openai.json
        run: |
          echo "${{ secrets.OPENAI_JSON_B64 }}" > openai.json.b64
          certutil -decode openai.json.b64 openai.json

      # 2nd.json (Base64)
      - name: Restore 2nd.json
        run: |
          echo "${{ secrets.DRIVE_JSON_B64 }}" > 2nd.json.b64
          certutil -decode 2nd.json.b64 2nd.json

      # drive_token_2nd.pickle (Base64)
      - name: Restore drive_token_2nd.pickle
        run: |
          echo "${{ secrets.DRIVE_TOKEN_2ND_B64 }}" > drive_token_2nd.pickle.b64
          certutil -decode drive_token_2nd.pickle.b64 drive_token_2nd.pickle

      # 실행
      - name: Run autopost script
        run: python app_galaxy_kr.py
