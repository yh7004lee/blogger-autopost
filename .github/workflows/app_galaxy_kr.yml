name: 02 Blogger Autopost googleplay kr

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"
    - cron: "0 7 * * *"
    - cron: "0 13 * * *"

jobs:
  autopost:
    runs-on: windows-latest

    env:
      API_KEYS_JSON: ${{ secrets.API_KEYS_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create blogger_token.json
        shell: powershell
        run: |
          @'
          ${{ secrets.BLOGGER_TOKEN_JSON }}
          '@ | Set-Content blogger_token.json

      - name: Restore cc.json
        run: |
          echo '${{ secrets.CC_JSON_B64 }}' | base64 --decode > cc.json

      - name: Restore sheetapi.json
        run: |
          echo '${{ secrets.SHEETAPI_JSON_B64 }}' | base64 --decode > sheetapi.json

      - name: Restore openai.json
        run: |
          echo '${{ secrets.OPENAI_JSON_B64 }}' | base64 --decode > openai.json

      - name: Restore 2nd.json
        run: |
          echo '${{ secrets.DRIVE_JSON_B64 }}' | base64 --decode > 2nd.json

      - name: Restore drive_token_2nd.pickle
        run: |
          echo '${{ secrets.DRIVE_TOKEN_2ND_B64 }}' | base64 --decode > drive_token_2nd.pickle

      - name: Run autopost script
        run: python app_galaxy_kr.py
