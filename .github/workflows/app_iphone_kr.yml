name: Blogger Autopost iphone kr

on:
  workflow_dispatch:

  schedule:
    # 한국시간 09:00
    - cron: "0 0 * * *"

    # 한국시간 15:00
    - cron: "0 6 * * *"

    # 한국시간 21:00
    - cron: "0 12 * * *"

jobs:
  autopost:
    runs-on: windows-latest

    env:
      API_KEYS_JSON: ${{ secrets.API_KEYS_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # blogger_token.json 복원
      - name: Restore blogger_token.json
        shell: cmd
        run: |
          echo %BLOGGER_TOKEN_JSON_B64% > blogger_token.json.b64
          certutil -decode blogger_token.json.b64 blogger_token.json
        env:
          BLOGGER_TOKEN_JSON_B64: ${{ secrets.BLOGGER_TOKEN_JSON_B64 }}

      # cc.json 복원
      - name: Restore cc.json
        shell: cmd
        run: |
          echo %CC_JSON_B64% > cc.json.b64
          certutil -decode cc.json.b64 cc.json
        env:
          CC_JSON_B64: ${{ secrets.CC_JSON_B64 }}

      # sheetapi.json 복원
      - name: Restore sheetapi.json
        shell: cmd
        run: |
          echo %SHEETAPI_JSON% > sheetapi.json.b64
          certutil -decode sheetapi.json.b64 sheetapi.json
        env:
          SHEETAPI_JSON: ${{ secrets.SHEETAPI_JSON }}

      # openai.json 복원
      - name: Restore openai.json
        shell: cmd
        run: |
          echo %OPENAI_JSON_B64% > openai.json.b64
          certutil -decode openai.json.b64 openai.json
        env:
          OPENAI_JSON_B64: ${{ secrets.OPENAI_JSON_B64 }}

      # 2nd.json 복원
      - name: Restore 2nd.json
        shell: cmd
        run: |
          echo %DRIVE_JSON_B64% > 2nd.json.b64
          certutil -decode 2nd.json.b64 2nd.json
        env:
          DRIVE_JSON_B64: ${{ secrets.DRIVE_JSON_B64 }}

      # drive_token_2nd.pickle 복원
      - name: Restore drive_token_2nd.pickle
        shell: cmd
        run: |
          echo %DRIVE_TOKEN_2ND_B64% > drive_token_2nd.pickle.b64
          certutil -decode drive_token_2nd.pickle.b64 drive_token_2nd.pickle
        env:
          DRIVE_TOKEN_2ND_B64: ${{ secrets.DRIVE_TOKEN_2ND_B64 }}

      # 실행
      - name: Run autopost script
        run: python app_iphone_kr_blogger3.py
