name: 07_World_Travel

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'
    - cron: '0 6 * * *'

jobs:
  autopost:
    runs-on: windows-latest

    env:
      SECRETS_API: ${{ secrets.SECRETS_API }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create blogger_token.json
        shell: pwsh
        run: |
          $token = @'
          ${{ secrets.BLOGGER_TOKEN_JSON }}
          '@
          Set-Content -Path blogger_token.json -Value $token -Encoding utf8

      - name: Restore cc.json
        shell: pwsh
        env:
          CC_JSON_B64: ${{ secrets.CC_JSON_B64 }}
        run: |
          $bytes = [System.Convert]::FromBase64String($env:CC_JSON_B64)
          [System.IO.File]::WriteAllBytes("cc.json", $bytes)

      - name: Restore sheetapi.json
        shell: pwsh
        env:
          SHEETAPI_JSON_B64: ${{ secrets.SHEETAPI_JSON_B64 }}
        run: |
          $bytes = [System.Convert]::FromBase64String($env:SHEETAPI_JSON_B64)
          [System.IO.File]::WriteAllBytes("sheetapi.json", $bytes)

      - name: Restore openai.json
        shell: pwsh
        env:
          OPENAI_JSON_B64: ${{ secrets.OPENAI_JSON_B64 }}
        run: |
          $bytes = [System.Convert]::FromBase64String($env:OPENAI_JSON_B64)
          [System.IO.File]::WriteAllBytes("openai.json", $bytes)

      - name: Restore 2nd.json
        shell: pwsh
        env:
          DRIVE_JSON_B64: ${{ secrets.DRIVE_JSON_B64 }}
        run: |
          $bytes = [System.Convert]::FromBase64String($env:DRIVE_JSON_B64)
          [System.IO.File]::WriteAllBytes("2nd.json", $bytes)

      - name: Restore drive_token_2nd.pickle
        shell: pwsh
        env:
          DRIVE_TOKEN_2ND_B64: ${{ secrets.DRIVE_TOKEN_2ND_B64 }}
        run: |
          $bytes = [System.Convert]::FromBase64String($env:DRIVE_TOKEN_2ND_B64)
          [System.IO.File]::WriteAllBytes("drive_token_2nd.pickle", $bytes)

      - name: Run autopost script
        run: python World_Travel.py
