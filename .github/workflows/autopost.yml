name: 03 Movie Autopost

on:
  schedule:
    - cron: "30 0 * * *"
    - cron: "30 1 * * *"
    - cron: "30 2 * * *"
    - cron: "30 3 * * *"
    - cron: "30 4 * * *"
    - cron: "30 5 * * *"
    - cron: "30 6 * * *"
    - cron: "30 7 * * *"
    - cron: "30 8 * * *"
    - cron: "30 9 * * *"
    - cron: "30 10 * * *"
    - cron: "30 11 * * *"
    - cron: "30 12 * * *"
    - cron: "30 13 * * *"
    - cron: "30 14 * * *"
    - cron: "30 15 * * *"
    - cron: "30 16 * * *"
    - cron: "30 17 * * *"
    - cron: "30 18 * * *"
    - cron: "30 19 * * *"
    - cron: "30 20 * * *"
    - cron: "30 21 * * *"
    - cron: "30 22 * * *"
    - cron: "30 23 * * *"

  workflow_dispatch:


jobs:
  autopost:
    runs-on: windows-latest

    env:
      API_KEYS_JSON: ${{ secrets.API_KEYS_JSON }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ✅ blogger_token.json 복원 (refresh_token 포함)
      - name: Restore blogger_token.json
        run: |
          echo "${{ secrets.BLOGGER_TOKEN_JSON_B64 }}" > blogger_token.json.b64
          certutil -decode blogger_token.json.b64 blogger_token.json

      # ✅ cc.json 복원 (OAuth client ID, client secret)
      - name: Restore cc.json
        run: |
          echo "${{ secrets.CC_JSON_B64 }}" > cc.json.b64
          certutil -decode cc.json.b64 cc.json

      # ✅ sheetapi.json 복원 (Google Sheets 서비스 계정)
      - name: Restore sheetapi.json
        run: |
          echo "${{ secrets.SHEETAPI_JSON }}" > sheetapi.json.b64
          certutil -decode sheetapi.json.b64 sheetapi.json

      # ✅ openai.json 복원
      - name: Restore openai.json
        run: |
          echo "${{ secrets.OPENAI_JSON_B64 }}" > openai.json.b64
          certutil -decode openai.json.b64 openai.json

      # ✅ 2nd.json 복원 (Google Drive OAuth 키, 서비스계정 아님)
      - name: Restore 2nd.json
        run: |
          echo "${{ secrets.DRIVE_JSON_B64 }}" > 2nd.json.b64
          certutil -decode 2nd.json.b64 2nd.json

      # ✅ drive_token_2nd.pickle 복원 (Drive 인증토큰)
      - name: Restore drive_token_2nd.pickle
        run: |
          echo "${{ secrets.DRIVE_TOKEN_2ND_B64 }}" > drive_token_2nd.pickle.b64
          certutil -decode drive_token_2nd.pickle.b64 drive_token_2nd.pickle

      - name: Run autopost
        run: python bloger_movie_autopost.py
